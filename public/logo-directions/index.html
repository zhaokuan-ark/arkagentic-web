<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArkAgentic Logo Directions</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #020617; color: #fff; padding: 32px; }
    .wrap { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 32px; margin: 0 0 12px; }
    p { color: #94a3b8; margin: 0 0 24px; }
    .card { background: #0b1220; border: 1px solid rgba(148,163,184,0.18); border-radius: 24px; padding: 20px; margin-bottom: 20px; }
    .label { font-size: 14px; text-transform: uppercase; letter-spacing: 0.18em; color: #a5f3fc; margin-bottom: 14px; }
    img { width: 100%; height: auto; display: block; border-radius: 18px; background: #020617; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ArkAgentic Logo Directions</h1>
    <p>Focused weight comparison after removing near-duplicates. Direction 16 is the current primary.</p>

    <div class="card">
      <div class="label">Direction 16 — Current primary</div>
      <img src="./arkagentic-logo-direction-16-brand-wordmark-tight.svg" alt="Direction 16" />
    </div>

    <div class="card">
      <div class="label">Direction 18A — Clearly slimmer</div>
      <img src="./arkagentic-logo-direction-18a-brand-wordmark-clearly-slimmer.svg" alt="Direction 18A" />
    </div>

    <div class="card">
      <div class="label">Direction 18B — Slimmest premium test</div>
      <img src="./arkagentic-logo-direction-18b-brand-wordmark-slimmest-premium.svg" alt="Direction 18B" />
    </div>
  </div>
</body>
</html>
